# ============================================================================
# German Compliance Audit Reports
# ============================================================================
#
# Generates synthetic Compliance-Prüfberichte (audit reports) as structured
# long-text documents. Each report consists of 4 segments: executive summary,
# findings (list), recommendations (list), and risk assessment.
#
# Target market: Datarade, EU AI Act compliance tool vendors, audit firms
# Competitive moat: Domain-realistic German compliance language from a 70B
# model running locally — no US cloud processing.
#
# Generation time estimate (70B, 2 concurrent):
#   ~4 segments (with lists) × ~90-120 sec avg/doc × 500 docs ≈ 2-3 days
#
# ============================================================================

metadata:
  name: "compliance-audit-report-de"
  version: "1.0.0"
  description: >
    Synthetic German compliance audit reports (Compliance-Prüfberichte) with
    segment-based generation: executive summary, individual findings with
    severity ratings, remediation recommendations, and risk assessment.
    Generated by a locally-run 70B parameter model. No cloud processing.
    3% of documents include deliberately injected realistic errors for
    error-detection model training.
  language: "de"
  license: "CC-BY-4.0"
  author: "ML Upskill Agents UG"
  contact: "workflow.tools@icloud.com"
  tags:
    - synthetic-data
    - german
    - compliance
    - audit
    - long-text
    - document-generation
    - eu-ai-act
    - dsgvo
  intended_uses:
    - ML training for compliance document classification
    - Audit automation tool testing
    - EU AI Act compliance assessment training datasets
    - NLP model training for German legal/regulatory text
    - Error detection model training (with injected realistic errors)
  out_of_scope_uses:
    - Must NOT be used as actual audit reports
    - Not suitable for regulatory submission to BaFin or any authority
    - Must NOT be attributed to any real auditing firm


# ============================================================================
# DOCUMENT TYPE DEFINITIONS
# ============================================================================

document_types:
  - name: compliance_report_de
    description: >
      German compliance/audit report following the structure commonly used
      by Wirtschaftsprüfer and internal audit departments. Covers findings,
      recommendations, and risk assessment for a fictional Mittelstand company.
    language: de
    format: markdown
    preamble: >
      # Compliance-Prüfbericht

      **Bericht-ID:** {document_id}

      **Berichtsdatum:** März 2026

      **Prüfungsgegenstand:** Compliance-Management-System gemäß IDW PS 980
    error_injection_rate: 0.03  # 3% of documents get realistic errors

    segments:
      # ── Section 1: Executive Summary ─────────────────────────
      - name: executive_summary
        segment_type: section
        label: "1. Zusammenfassung der Prüfungsergebnisse"
        description: "Executive summary of audit findings"
        prompt: >
          Verfassen Sie eine Zusammenfassung für einen Compliance-Prüfbericht
          eines mittelständischen deutschen Unternehmens.

          Erstellen Sie zunächst einen fiktiven Firmennamen und eine Branche,
          dann beschreiben Sie:
          - Den Gesamtzustand des Compliance-Management-Systems
          - Die Anzahl und Schwere der Feststellungen (verwenden Sie 3-6 Feststellungen)
          - Das Gesamtrisikoprofil (gering/mittel/hoch/kritisch)
          - Einen kurzen Ausblick auf notwendige Maßnahmen

          Schreiben Sie in formaler Prüfungssprache, 200-300 Wörter.
          Verwenden Sie typische Formulierungen der deutschen Wirtschaftsprüfung.
        system_prompt: >
          Sie sind ein erfahrener Wirtschaftsprüfer und Compliance-Berater,
          der Prüfberichte nach IDW PS 980 verfasst. Ihre Sprache ist formal,
          präzise und fachsprachlich korrekt. Verwenden Sie keine englischen
          Begriffe, wenn deutsche Fachbegriffe existieren.
        temperature: 0.65
        max_tokens: 600
        context_dependencies: []
        min_length: 300
        max_length: 800

      # ── Section 2: Individual Findings ───────────────────────
      - name: findings
        segment_type: list_field
        label: "2. Prüfungsfeststellungen"
        description: "Individual compliance findings (3-6 items)"
        prompt: >
          Erstellen Sie die Feststellung Nr. {item_number} für den
          Compliance-Prüfbericht.

          Zusammenfassung des Berichts:
          {executive_summary}

          Bisherige Feststellungen:
          {findings}

          Erstellen Sie EINE Feststellung mit folgender Struktur:
          - Feststellungs-ID (z.B. F-{item_number})
          - Kategorie (z.B. Datenschutz, Geldwäscheprävention, Arbeitsrecht,
            IT-Sicherheit, Lieferkettensorgfalt, Kartellrecht)
          - Schweregrad: Hoch / Mittel / Gering
          - Beschreibung der Abweichung (80-150 Wörter)
          - Betroffenes Regelwerk (z.B. DSGVO Art. 30, GwG § 4, ArbSchG § 5)
          - Nachweise und Belege

          Stellen Sie sicher, dass die Feststellung mit der Zusammenfassung
          konsistent ist und sich von den bisherigen Feststellungen unterscheidet.
        system_prompt: >
          Sie sind ein Compliance-Prüfer. Jede Feststellung muss konkret,
          nachvollziehbar und mit Bezug auf das relevante Regelwerk sein.
          Vermeiden Sie vage Formulierungen.
        temperature: 0.7
        max_tokens: 350
        list_min: 3
        list_max: 6
        context_dependencies:
          - executive_summary
        required_keywords:
          - "Regelwerk"

      # ── Section 3: Recommendations ───────────────────────────
      - name: recommendations
        segment_type: list_field
        label: "3. Empfehlungen und Maßnahmen"
        description: "Remediation recommendations (2-4 items)"
        prompt: >
          Erstellen Sie Empfehlung Nr. {item_number} basierend auf den
          Prüfungsfeststellungen.

          Feststellungen:
          {findings}

          Bisherige Empfehlungen:
          {recommendations}

          Erstellen Sie EINE Empfehlung mit folgender Struktur:
          - Empfehlungs-ID (z.B. E-{item_number})
          - Bezug zur Feststellung (F-Nummer)
          - Maßnahme (konkrete Handlungsanweisung, 60-100 Wörter)
          - Verantwortliche Stelle (z.B. Compliance-Abteilung, Geschäftsführung, IT)
          - Umsetzungsfrist (Wochen/Monate)
          - Priorität: Sofort / Kurzfristig / Mittelfristig
          - Erwartete Wirkung

          Die Empfehlung muss sich direkt auf eine der Feststellungen beziehen.
        system_prompt: >
          Sie sind ein Compliance-Berater, der konkrete Verbesserungsmaßnahmen
          vorschlägt. Ihre Empfehlungen müssen umsetzbar, terminiert und
          einer verantwortlichen Stelle zugeordnet sein.
        temperature: 0.7
        max_tokens: 300
        list_min: 2
        list_max: 4
        context_dependencies:
          - findings

      # ── Section 4: Risk Assessment ──────────────────────────
      - name: risk_assessment
        segment_type: section
        label: "4. Risikobewertung und Ausblick"
        description: "Overall risk assessment and outlook"
        prompt: >
          Verfassen Sie die abschließende Risikobewertung für den
          Compliance-Prüfbericht.

          Feststellungen:
          {findings}

          Empfehlungen:
          {recommendations}

          Beschreiben Sie:
          - Gesamtrisikobewertung (residuales Risiko nach Umsetzung der Empfehlungen)
          - Wahrscheinlichkeit behördlicher Maßnahmen bei Nichtbehebung
          - Empfohlener Zeitpunkt für die Nachprüfung
          - Einschätzung der Umsetzbarkeit der Empfehlungen
          - Abschließende Bewertung des Compliance-Reifegrads

          Schreiben Sie in formaler Sprache, 150-250 Wörter.
        system_prompt: >
          Sie sind ein erfahrener Risikomanager. Ihre Bewertung muss die
          Feststellungen und Empfehlungen kohärent zusammenfassen und eine
          klare Handlungsempfehlung für die Geschäftsführung geben.
        temperature: 0.6
        max_tokens: 500
        context_dependencies:
          - findings
          - recommendations
        min_length: 200
        max_length: 600


# ============================================================================
# DOCUMENT TABLES
# ============================================================================

document_tables:
  - name: audit_reports
    description: "500 synthetic German compliance audit reports"
    records: 500
    document_type: compliance_report_de


# ============================================================================
# GENERATION SETTINGS
# ============================================================================

generation:
  method: gaussian_copula
  ollama_concurrent: 1
  ollama_base_url: "http://localhost:11434"
  ollama_default_model: "llama3.1:70b-instruct-q4_K_M"


# ============================================================================
# VALIDATION SETTINGS
# ============================================================================

validation:
  enabled: true
  document_validators:
    - language_detection
    - structural_completeness
    - segment_length_check
    - keyword_presence
  min_quality_score: 0.75
  generate_html_report: true


# ============================================================================
# PACKAGING SETTINGS
# ============================================================================

packaging:
  preview_rows: 25
  output_csv: false
  output_parquet: false
  output_jsonl: true
  generate_datasheet: true
  generate_schema: true
  create_zip: true

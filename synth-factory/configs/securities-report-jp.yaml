# ============================================================================
# Japanese Securities Reports (有価証券報告書)
# ============================================================================
#
# Generates synthetic 有価証券報告書 as structured long-text documents.
# These are the annual financial filings required by Japan's FSA for all
# publicly listed companies — 50-100+ page documents covering company
# overview, business risks, MD&A, financial statements, and governance.
#
# Data source: EDINET API v2 (free, FSA-operated)
# Flaw intelligence: FSA enforcement actions, EDINET amendment filings
#
# Target market:
#   - AI training for Japanese financial document understanding
#   - Compliance/RegTech testing (document validation systems)
#   - NLP model training for financial text extraction
#   - Benchmark datasets (following SakanaAI's EDINET-Bench pattern)
#
# Competitive moat:
#   - 70B model generating domain-specific Japanese financial prose
#   - Flaw taxonomy from real FSA enforcement patterns
#   - Segment-level context threading for cross-section coherence
#   - Cannot be replicated without local LLM + EDINET API access
#
# Generation time estimate (70B, 1 concurrent):
#   ~8 segments × ~90-120 sec/segment × 500 docs ≈ 4-7 days
#
# ============================================================================

metadata:
  name: "securities-report-jp"
  version: "1.0.0"
  description: >
    Synthetic Japanese securities reports (有価証券報告書) modeled on
    real EDINET filings. Each document follows the FSA-mandated structure:
    company overview, business status (including MD&A and risk factors),
    corporate governance, and financial statement narratives. Generated by
    a locally-run 70B parameter model with segment-based context threading.
    Includes domain-authentic error injection based on real FSA enforcement
    patterns. No real company data. No cloud processing.
  language: "ja"
  license: "CC-BY-4.0"
  author: "Misawa Data GK"
  contact: "workflow.tools@icloud.com"
  tags:
    - synthetic-data
    - japanese
    - financial
    - securities-report
    - edinet
    - yuho
    - long-text
    - document-generation
    - compliance
    - regtech
  intended_uses:
    - ML training for Japanese financial document understanding
    - NLP model fine-tuning for financial text extraction and summarization
    - Compliance testing for RegTech document validation systems
    - Benchmark dataset creation (EDINET-Bench style)
    - Testing document processing pipelines
  out_of_scope_uses:
    - Must NOT be used as actual financial filings
    - Must NOT be represented as real company disclosures
    - Not suitable for investment decision-making
    - Must NOT be submitted to any regulatory authority


# ============================================================================
# DOCUMENT TYPE DEFINITIONS
# ============================================================================

document_types:
  - name: securities_report_jp
    description: >
      Japanese annual securities report (有価証券報告書) with 8 major sections
      following the FSA-mandated disclosure structure. Each section is generated
      with context from prior sections for cross-reference coherence.
    language: ja
    format: json
    preamble: >
      # 有価証券報告書

      **提出日:** 2026年3月
      **書類管理番号:** {document_id}

    # Inject domain-authentic errors into 8% of documents
    error_injection_rate: 0.08

    segments:
      # ── Section 1: Company Overview ─────────────────────────
      - name: company_overview
        segment_type: section
        label: "第一部 企業情報 / 第1 企業の概況"
        description: "Company name, founding, business description, key indicators"
        prompt: >
          あなたは日本の上場企業の有価証券報告書を作成する専門家です。
          以下の「企業の概況」セクションを架空の企業について作成してください。

          含める内容：
          - 会社名（架空の日本企業名）と英文名
          - 設立年月日
          - 主たる事業の内容（2-3事業セグメント）
          - 従業員数（連結・単体）
          - 主要な経営指標等の推移（売上高、営業利益、経常利益、当期純利益を
            直近3期分、百万円単位で架空の数値を記載）
          - 沿革（設立から現在までの主要な出来事5-8件）

          リアルな日本の上場企業の有価証券報告書と区別がつかない品質で
          作成してください。数値は整合性を持たせてください。
        system_prompt: >
          あなたは日本の金融庁への提出書類を作成する専門家です。
          有価証券報告書の様式に厳密に従い、正確かつ専門的な日本語で記述してください。
          架空の企業ですが、実在する上場企業の記載と同等の品質を目指してください。
        temperature: 0.75
        max_tokens: 1500
        context_dependencies: []
        min_length: 800
        max_length: 3000

      # ── Section 2: Business Status ──────────────────────────
      - name: business_status
        segment_type: section
        label: "第2 事業の状況 / 経営方針・戦略等"
        description: "Business strategy, management policies, KPIs"
        prompt: >
          以下の企業について「事業の状況」の冒頭部分（経営方針・経営戦略等）を
          作成してください。

          企業の概況：
          {company_overview}

          含める内容：
          - 経営方針と中期経営計画の概要
          - 事業環境の認識（業界動向）
          - 対処すべき課題（3-5項目）
          - 経営上の目標の達成状況を判断するための客観的な指標（KPI）

          前セクションの企業情報と整合性を持たせてください。
        system_prompt: >
          有価証券報告書の「事業の状況」セクションを正確な様式で作成してください。
          経営方針は具体的かつ説得力のある内容にしてください。
        temperature: 0.75
        max_tokens: 1200
        context_dependencies:
          - company_overview
        min_length: 600
        max_length: 2500

      # ── Section 3: Business Risks ───────────────────────────
      - name: business_risks
        segment_type: section
        label: "事業等のリスク"
        description: "Material risk factors facing the company"
        prompt: >
          以下の企業について「事業等のリスク」セクションを作成してください。

          企業の概況：
          {company_overview}

          事業の状況：
          {business_status}

          含める内容（6-8個のリスク要因）：
          - 事業固有のリスク（企業の事業内容に合わせた具体的リスク）
          - 市場・経済リスク
          - 規制・法的リスク
          - 技術リスク
          - 人材リスク
          - その他のリスク（自然災害、パンデミック等）

          各リスクには以下を含めてください：
          - リスクの内容の具体的説明
          - 発生可能性に対する認識
          - 会社が講じている対応策

          ボイラープレートではなく、企業の事業に即した具体的なリスク記載にしてください。
        system_prompt: >
          有価証券報告書の「事業等のリスク」は近年、金融庁から具体性・網羅性が
          強く求められています。一般的なリスク列挙ではなく、当該企業の事業に
          固有のリスクを詳細に記載してください。
        temperature: 0.8
        max_tokens: 2000
        context_dependencies:
          - company_overview
          - business_status
        min_length: 1000
        max_length: 4000

      # ── Section 4: MD&A ─────────────────────────────────────
      - name: md_and_a
        segment_type: section
        label: "経営者による財政状態、経営成績及びキャッシュ・フローの状況の分析"
        description: "Management Discussion & Analysis"
        prompt: >
          以下の企業について「経営者による財政状態、経営成績及びキャッシュ・フロー
          の状況の分析」（MD&A）セクションを作成してください。

          企業の概況（経営指標含む）：
          {company_overview}

          事業の状況：
          {business_status}

          含める内容：
          1. 経営成績の概況
             - 売上高の増減要因（セグメント別）
             - 営業利益の増減要因
             - 経常利益・当期純利益の状況
          2. 財政状態の分析
             - 資産・負債・純資産の状況
             - 主要な変動要因
          3. キャッシュ・フローの状況
             - 営業CF、投資CF、財務CFの概況
          4. 重要な会計上の見積り
          5. 経営成績に重要な影響を与える要因

          企業の概況で記載した数値と整合性を持たせ、具体的な増減額と
          パーセンテージを含めてください。
        system_prompt: >
          MD&Aは有価証券報告書の中で最も分析的なセクションです。
          数値に基づく具体的な分析を記載し、前年比較を含めてください。
          「企業の概況」で記載した経営指標と矛盾しないようにしてください。
        temperature: 0.7
        max_tokens: 2000
        context_dependencies:
          - company_overview
          - business_status
        min_length: 1000
        max_length: 4000

      # ── Section 5: Corporate Governance ─────────────────────
      - name: corporate_governance
        segment_type: section
        label: "コーポレート・ガバナンスの状況等"
        description: "Governance structure, board composition, compliance"
        prompt: >
          以下の企業について「コーポレート・ガバナンスの状況等」セクションを
          作成してください。

          企業の概況：
          {company_overview}

          含める内容：
          - コーポレート・ガバナンスに関する基本的な考え方
          - 企業統治の体制の概要（取締役会、監査役会/監査等委員会）
          - 社外取締役・社外監査役の員数と独立性
          - 内部統制システムの整備の状況
          - リスク管理体制
          - 役員報酬の方針と内容
          - 株式の保有状況（政策保有株式の考え方）

          コーポレートガバナンス・コード改訂（2021年）への対応状況を
          含めてください。
        system_prompt: >
          コーポレートガバナンスの記載は近年、特に充実が求められています。
          東京証券取引所の市場区分に応じた記載を心がけてください。
        temperature: 0.7
        max_tokens: 1500
        context_dependencies:
          - company_overview
        min_length: 800
        max_length: 3000

      # ── Section 6: Stock Information ────────────────────────
      - name: stock_info
        segment_type: form_field
        label: "株式等の状況"
        description: "Share capital, major shareholders, stock price history"
        prompt: >
          以下の企業について「株式等の状況」セクションを作成してください。

          企業の概況：
          {company_overview}

          含める内容：
          - 発行可能株式総数
          - 発行済株式の総数
          - 大株主の状況（上位10名、持株比率）
          - 自己株式の状況
          - 株価の推移（直近6ヶ月の月別高値・安値）

          数値は架空ですが、日本の上場企業として合理的な範囲にしてください。
        system_prompt: >
          株式情報は表形式が多いセクションです。
          実際の有価証券報告書と同様のフォーマットで記載してください。
        temperature: 0.7
        max_tokens: 1000
        context_dependencies:
          - company_overview
        min_length: 400
        max_length: 2000

      # ── Section 7: Directors ────────────────────────────────
      - name: directors
        segment_type: list_field
        label: "役員の状況"
        description: "Board members and key officers"
        prompt: >
          以下の企業の「役員の状況」の{item_number}人目の役員情報を作成してください。

          企業の概況：
          {company_overview}

          これまでの役員情報：
          {directors}

          含める内容：
          - 氏名（架空の日本人名）
          - 生年月日
          - 略歴（入社年、主要ポスト歴、現職名）
          - 役職名
          - 所有株式数
          - 社外役員かどうか

          他の役員と重複しない経歴にしてください。
        system_prompt: >
          有価証券報告書の役員一覧の記載形式に従ってください。
        temperature: 0.75
        max_tokens: 300
        list_min: 5
        list_max: 8
        context_dependencies:
          - company_overview
        min_length: 100
        max_length: 600

      # ── Section 8: Financial Highlights ─────────────────────
      - name: financial_highlights
        segment_type: section
        label: "経理の状況（財務諸表の概要）"
        description: "Financial statement summary and accounting policies"
        prompt: >
          以下の企業について「経理の状況」セクションの冒頭部分を作成してください。

          企業の概況（経営指標含む）：
          {company_overview}

          MD&A：
          {md_and_a}

          含める内容：
          - 連結財務諸表の作成方法
          - 主要な会計方針
             - 収益認識基準
             - 有形固定資産の減価償却方法
             - のれんの償却方法
             - 引当金の計上基準
          - 会計上の見積りおよび当該見積りに用いた仮定
          - 重要な後発事象（該当なしでも記載）

          MD&Aで記載した数値と矛盾しないようにしてください。
        system_prompt: >
          経理の状況は専門的な会計用語を正確に使用してください。
          日本の会計基準（J-GAAP）またはIFRSに基づく記載としてください。
        temperature: 0.7
        max_tokens: 1500
        context_dependencies:
          - company_overview
          - md_and_a
        min_length: 600
        max_length: 3000


# ============================================================================
# DOCUMENT TABLES
# ============================================================================

document_tables:
  - name: securities_reports
    description: "500 synthetic Japanese securities reports (有価証券報告書)"
    records: 500
    document_type: securities_report_jp


# ============================================================================
# GENERATION SETTINGS
# ============================================================================

generation:
  method: gaussian_copula
  ollama_concurrent: 1
  ollama_base_url: "http://localhost:11434"
  ollama_default_model: "llama3.1:70b-instruct-q4_K_M"


# ============================================================================
# VALIDATION SETTINGS
# ============================================================================

validation:
  enabled: true
  document_validators:
    - language_detection
    - structural_completeness
    - segment_length_check
    - keyword_presence
  min_quality_score: 0.75
  generate_html_report: true


# ============================================================================
# PACKAGING SETTINGS
# ============================================================================

packaging:
  preview_rows: 25
  output_csv: false
  output_parquet: false
  output_jsonl: true
  generate_datasheet: true
  generate_schema: true
  create_zip: true

# ============================================================================
# Japanese Housing Management Application Forms
# ============================================================================
#
# Generates synthetic 住宅管理申請書 (housing management application forms)
# as structured long-text documents. Each document consists of 4 segments
# generated sequentially with context threading for coherence.
#
# Target market: JDEX, proptech companies, municipal digital transformation
# Competitive moat: 70B model generating domain-realistic Japanese forms
# that cannot be replicated without local LLM infrastructure.
#
# Generation time estimate (70B, 2 concurrent):
#   ~4 segments × ~60-90 sec/segment × 1000 docs ≈ 3-5 days
#
# ============================================================================

metadata:
  name: "housing-management-application-jp"
  version: "1.0.0"
  description: >
    Synthetic Japanese housing management application forms (住宅管理申請書)
    with segment-based generation: personal details, residence history,
    employment information, and family composition. Each form is a coherent
    multi-section document generated by a locally-run 70B parameter model.
    No real personal data. No cloud processing.
  language: "ja"
  license: "CC-BY-4.0"
  author: "ML Upskill Agents UG"
  contact: "workflow.tools@icloud.com"
  tags:
    - synthetic-data
    - japanese
    - housing
    - forms
    - long-text
    - document-generation
    - proptech
    - tatemono-kanri
  intended_uses:
    - ML training for Japanese document understanding and OCR post-processing
    - Housing management automation system testing
    - NLP model training for form field extraction
    - Digital transformation testing for municipal housing authorities
  out_of_scope_uses:
    - Must NOT be used as actual housing applications
    - Not suitable for immigration or government submissions
    - Must NOT be represented as real personal data


# ============================================================================
# DOCUMENT TYPE DEFINITIONS
# ============================================================================

document_types:
  - name: housing_application_jp
    description: >
      Japanese housing management application form with 4 sections.
      Mimics the structure of 管理組合 (management association) and
      公営住宅 (public housing) application paperwork.
    language: ja
    format: markdown
    preamble: "# 住宅管理申請書\n\n**申請番号:** {document_id}\n**申請日:** 2026年3月\n"

    segments:
      # ── Section 1: Personal Details ──────────────────────────
      - name: personal_details
        segment_type: form_field
        label: "1. 申請者情報（個人情報）"
        description: "Applicant personal identification and contact information"
        prompt: >
          あなたは日本の住宅管理事務所の職員です。以下の住宅管理申請書の「申請者情報」
          セクションを作成してください。

          架空の申請者の情報を生成してください：
          - 氏名（漢字とフリガナ）
          - 生年月日と年齢
          - 性別
          - 国籍
          - 現住所（都道府県、市区町村、番地）
          - 電話番号（携帯）
          - メールアドレス
          - 緊急連絡先（氏名と電話番号）

          フォーマット：各項目をラベル付きで記載してください。
          自然で現実的な日本語で記載してください。
        system_prompt: >
          あなたは日本の住宅管理事務所で勤務する経験豊富な事務職員です。
          申請書類は正確かつ丁寧な日本語で作成してください。
          架空のデータですが、現実の申請書と区別がつかないほどリアルに作成してください。
        temperature: 0.75
        max_tokens: 400
        context_dependencies: []
        min_length: 200
        max_length: 800

      # ── Section 2: Residence History ─────────────────────────
      - name: residence_history
        segment_type: list_field
        label: "2. 住居履歴"
        description: "Previous residences (2-3 entries)"
        prompt: >
          住宅管理申請書の「住居履歴」セクションの{item_number}番目の項目を作成してください。

          申請者情報：
          {personal_details}

          これまでの住居履歴：
          {residence_history}

          以下の情報を含めてください：
          - 住所（都道府県から番地まで）
          - 入居日と退去日
          - 住居形態（賃貸マンション、公営住宅、持ち家など）
          - 家賃（月額）
          - 退去理由

          1つの住居履歴のみを記載してください。100〜150文字程度。
        system_prompt: >
          あなたは住宅管理事務所の職員です。住居履歴は申請者の個人情報と
          矛盾しないように注意してください。
        temperature: 0.75
        max_tokens: 200
        list_min: 2
        list_max: 3
        context_dependencies:
          - personal_details
        min_length: 80
        max_length: 300

      # ── Section 3: Employment ────────────────────────────────
      - name: employment
        segment_type: section
        label: "3. 雇用情報"
        description: "Current employment status and income"
        prompt: >
          住宅管理申請書の「雇用情報」セクションを作成してください。

          申請者情報：
          {personal_details}

          住居履歴：
          {residence_history}

          以下の情報を含めてください：
          - 勤務先名称
          - 勤務先住所
          - 業種
          - 役職・職種
          - 雇用形態（正社員、契約社員、パートなど）
          - 勤続年数
          - 年収（概算）
          - 勤務先電話番号

          申請者の住居履歴と矛盾しない内容にしてください。
          150〜250文字程度で記載してください。
        system_prompt: >
          あなたは住宅管理事務所の職員です。雇用情報は申請者の年齢、住居履歴と
          整合性を持たせてください。年収は住宅申請に適切な範囲にしてください。
        temperature: 0.7
        max_tokens: 400
        context_dependencies:
          - personal_details
          - residence_history
        min_length: 150
        max_length: 500

      # ── Section 4: Family Composition ────────────────────────
      - name: family_composition
        segment_type: section
        label: "4. 家族構成"
        description: "Family members and dependents"
        prompt: >
          住宅管理申請書の「家族構成」セクションを作成してください。

          申請者情報：
          {personal_details}

          雇用情報：
          {employment}

          以下の情報を含めてください：
          - 配偶者の有無と情報（氏名、年齢、職業）
          - 子供の情報（氏名、年齢、学校/保育園）
          - その他同居予定者
          - 世帯人数合計
          - 世帯年収合計（概算）

          申請者の個人情報、年齢、雇用情報と矛盾しない家族構成にしてください。
          120〜200文字程度で記載してください。
        system_prompt: >
          あなたは住宅管理事務所の職員です。家族構成は申請者の年齢と
          整合性を持たせてください。子供の年齢は申請者の年齢から
          合理的な範囲にしてください。
        temperature: 0.7
        max_tokens: 350
        context_dependencies:
          - personal_details
          - employment
        required_keywords:
          - "家族"
        min_length: 120
        max_length: 400


# ============================================================================
# DOCUMENT TABLES
# ============================================================================

document_tables:
  - name: housing_applications
    description: "1000 synthetic Japanese housing management application forms"
    records: 1000
    document_type: housing_application_jp


# ============================================================================
# GENERATION SETTINGS
# ============================================================================

generation:
  method: gaussian_copula
  ollama_concurrent: 1  # Sequential for document quality; segments depend on each other
  ollama_base_url: "http://localhost:11434"
  ollama_default_model: "llama3.1:70b-instruct-q4_K_M"


# ============================================================================
# VALIDATION SETTINGS
# ============================================================================

validation:
  enabled: true
  document_validators:
    - language_detection
    - structural_completeness
    - segment_length_check
    - keyword_presence
  min_quality_score: 0.75
  generate_html_report: true


# ============================================================================
# PACKAGING SETTINGS
# ============================================================================

packaging:
  preview_rows: 50
  output_csv: false
  output_parquet: false
  output_jsonl: true
  generate_datasheet: true
  generate_schema: true
  create_zip: true

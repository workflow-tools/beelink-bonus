# RegWatch — EHCP Audit Watch List
#
# Monitors UK SEND legislation and policy sources.
# Placeholder — to be expanded when EHCP Audit moves to front-burner.
# Relevant to GRUND dissertation research (regulatory corpus freshness).

watches:

  - url: "https://www.gov.uk/government/publications/send-code-of-practice-0-to-25"
    check_interval: "7d"
    context:
      product: ehcpaudit
      categories: ["send_code", "uk"]
      note: "SEND Code of Practice — foundational document for EHCP compliance"

  - url: "https://www.legislation.gov.uk/ukpga/2014/6/contents"
    check_interval: "30d"
    context:
      product: ehcpaudit
      categories: ["legislation", "uk"]
      note: "Children and Families Act 2014 — primary SEND legislation"

  - url: "https://www.gov.uk/government/collections/send-tribunal-decisions"
    check_interval: "7d"
    context:
      product: ehcpaudit
      categories: ["tribunal", "uk"]
      note: "SEND tribunal decisions — tracks precedent-setting rulings"
